<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Analysis</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
        }
        nav {
            background-color: #333;
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 1rem;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            padding: 2rem;
        }
        .filter-section {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .filter-section input {
            padding: 0.5rem;
            border: 1px solid #444;
            border-radius: 5px;
            background-color: #1e1e1e;
            color: #ffffff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        table th, table td {
            border: 1px solid #444;
            padding: 0.5rem;
            text-align: center;
        }
        table th {
            background-color: #333;
            color: #00bcd4;
            cursor: pointer; /* Add pointer cursor for sortable columns */
        }
        table tr:nth-child(even) {
            background-color: #2a2a2a;
        }
        table tr:nth-child(odd) {
            background-color: #1e1e1e;
        }
    </style>
</head>
<body>
    <nav>
        <div>Trading Bot Dashboard</div>
        <div>
            <a href="/">Home</a>
            <a href="/historical">Historical Analysis</a>
        </div>
    </nav>
    <div class="container">
        <h1>Historical Analysis</h1>
        <p id="no-historical-data-message">Fetching historical data...</p>

        <!-- Filter Section -->
        <div class="filter-section">
            <label for="filter-input">Filter by Symbol or Side:</label>
            <input type="text" id="filter-input" placeholder="Enter symbol or side (e.g., BTC, short)">
        </div>

        <!-- Table for Historical Trades -->
        <table id="historical-trades-table" style="display: none;">
            <thead>
                <tr>
                    <th data-sort="symbol">Symbol</th>
                    <th data-sort="side">Side</th>
                    <th data-sort="entry_date">Entry Date</th>
                    <th data-sort="entry_time">Entry Time</th>
                    <th data-sort="exit_date">Exit Date</th>
                    <th data-sort="exit_time">Exit Time</th>
                    <th data-sort="entry_price">Entry Price</th>
                    <th data-sort="exit_price">Exit Price</th>
                    <th data-sort="profit_loss">Profit/Loss</th>
                    <th data-sort="trade_duration">Trade Duration</th>
                    <th data-sort="exit_reason">Exit Reason</th>
                </tr>
            </thead>
            <tbody id="historical-trades-body">
                <!-- Data will be dynamically inserted here -->
            </tbody>
        </table>
    </div>

    <script>
        // Replace with your Raspberry Pi's IP address
        const historicalApiUrl = 'http://192.168.1.9:5000/api/historical-trades';

        let currentSortColumn = null;
        let currentSortDirection = 'asc';

        function formatNumber(value) {
            return parseFloat(value).toFixed(2);
        }

        function formatDuration(duration) {
            const minutes = Math.floor(duration / 60);
            const hours = Math.floor(minutes / 60);
            return `${hours}h ${minutes % 60}m`;
        }

        function sortTable(column) {
            const tableBody = document.getElementById('historical-trades-body');
            const rows = Array.from(tableBody.querySelectorAll('tr'));

            if (currentSortColumn === column) {
                currentSortDirection = currentSortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                currentSortDirection = 'asc';
            }
            currentSortColumn = column;

            rows.sort((a, b) => {
                const aValue = a.querySelector(`td:nth-child(${column})`).textContent.trim();
                const bValue = b.querySelector(`td:nth-child(${column})`).textContent.trim();

                if (!isNaN(aValue) && !isNaN(bValue)) {
                    return currentSortDirection === 'asc'
                        ? parseFloat(aValue) - parseFloat(bValue)
                        : parseFloat(bValue) - parseFloat(aValue);
                } else {
                    return currentSortDirection === 'asc'
                        ? aValue.localeCompare(bValue)
                        : bValue.localeCompare(aValue);
                }
            });

            rows.forEach(row => tableBody.appendChild(row));
        }

        function filterTable() {
            const filterValue = document.getElementById('filter-input').value.toLowerCase();
            const tableBody = document.getElementById('historical-trades-body');
            const rows = tableBody.querySelectorAll('tr');

            rows.forEach(row => {
                const symbol = row.querySelector('td:nth-child(1)').textContent.toLowerCase();
                const side = row.querySelector('td:nth-child(2)').textContent.toLowerCase();

                if (symbol.includes(filterValue) || side.includes(filterValue)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }

        document.querySelectorAll('th[data-sort]').forEach((header, index) => {
            header.addEventListener('click', () => sortTable(index + 1));
        });

        document.getElementById('filter-input').addEventListener('input', filterTable);

        async function fetchHistoricalTrades() {
            try {
                const response = await fetch(historicalApiUrl);
                const data = await response.json();

                const table = document.getElementById('historical-trades-table');
                const tableBody = document.getElementById('historical-trades-body');
                const noDataMessage = document.getElementById('no-historical-data-message');

                tableBody.innerHTML = '';

                if (data.length === 0) {
                    noDataMessage.textContent = 'No historical trades available.';
                    table.style.display = 'none';
                } else {
                    noDataMessage.style.display = 'none';
                    table.style.display = 'table';

                    data.forEach(trade => {
                        const entryDateTime = new Date(parseFloat(trade.entry_time) * 1000);
                        const exitDateTime = new Date(parseFloat(trade.exit_time) * 1000);

                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${trade.symbol}</td>
                            <td>${trade.side}</td>
                            <td>${entryDateTime.toLocaleDateString()}</td>
                            <td>${entryDateTime.toLocaleTimeString()}</td>
                            <td>${exitDateTime.toLocaleDateString()}</td>
                            <td>${exitDateTime.toLocaleTimeString()}</td>
                            <td>${formatNumber(trade.entry_price)}</td>
                            <td>${formatNumber(trade.exit_price)}</td>
                            <td>${formatNumber(trade.profit_loss)}</td>
                            <td>${formatDuration(trade.trade_duration)}</td>
                            <td>${trade.exit_reason}</td>
                        `;
                        tableBody.appendChild(row);
                    });
                }
            } catch (error) {
                console.error('Error fetching historical trades:', error);
                document.getElementById('no-historical-data-message').textContent = 'Error fetching data. Please try again later.';
            }
        }

        fetchHistoricalTrades();
    </script>
</body>
</html>
